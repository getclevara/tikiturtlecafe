*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070d18;--navy:#0c1628;--navy-l:#12203a;--navy-m:#1a2d4a;
  --gold:#d4a843;--gold-l:#e8c36a;--teal:#1a8a7d;--teal-l:#25b5a4;
  --coral:#e85d4a;--white:#eee8dc;--gray:#6b7a8d;--gray-l:#8a97a8;
  --border:#1e3050;--card:#0f1a2e;
}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);-webkit-font-smoothing:antialiased}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);padding:20px}
.login-box{background:var(--navy);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:100%;max-width:360px;text-align:center}
.login-emoji{font-size:48px;margin-bottom:12px}
.login-title{font-size:22px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--gray-l);margin-bottom:28px}
.login-input{width:100%;padding:14px 16px;background:var(--navy-l);border:1px solid var(--border);border-radius:10px;color:var(--white);font-size:20px;text-align:center;letter-spacing:12px;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:16px}
.login-input::placeholder{letter-spacing:4px;font-size:14px;color:var(--gray)}
.login-input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:14px;background:var(--gold);color:var(--bg);font-weight:700;font-size:15px;border:none;border-radius:10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.login-btn:active{opacity:0.85}
.login-err{color:var(--coral);font-size:13px;margin-top:12px}

/* APP SHELL */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{background:var(--navy);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.header-emoji{font-size:28px}
.header-title{font-size:16px;font-weight:700;color:var(--gold);line-height:1.1}
.header-sub{font-size:11px;color:var(--gray-l);display:flex;align-items:center;gap:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.sync-ok{background:#10b981}
.sync-err{background:var(--coral)}
.sync-load{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.logout-btn{background:var(--navy-l);border:1px solid var(--border);color:var(--gray-l);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.logout-btn:active{background:var(--navy-m)}

/* TABS */
.tab-bar{display:flex;background:var(--navy);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab .badge{display:inline-block;background:var(--gold);color:var(--bg);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:4px;vertical-align:middle}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--navy-m);border-radius:3px}
.pad{padding:12px 14px 100px}

/* SPECIALS */
.specials-toggle{display:flex;gap:8px;margin-bottom:12px}
.spec-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--navy);color:var(--gray-l);font-size:13px;font-weight:600;cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif}
.spec-btn.active{background:var(--navy-m);border-color:var(--gold);color:var(--gold)}
.specials-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:16px}
.spec-card{background:var(--navy-l);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px}
.spec-day{font-weight:700;color:var(--gold);font-size:11px;text-transform:uppercase}
.spec-name{color:var(--white);margin-top:2px;line-height:1.3}
.spec-price{color:var(--teal-l);font-weight:600;font-size:11px;margin-top:2px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px}
.search-input{width:100%;padding:12px 14px 12px 38px;background:var(--navy-l);border:1px solid var(--border);border-radius:10px;color:var(--white);font-size:14px;outline:none;font-family:'DM Sans',sans-serif}
.search-input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:16px}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);cursor:pointer;font-size:18px;padding:4px}

/* CATEGORY */
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--navy-l);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;user-select:none}
.cat-title{font-size:14px;font-weight:700;color:var(--white)}
.cat-count{font-size:11px;color:var(--gray-l);margin-left:8px}
.cat-count .hl{color:var(--gold);font-weight:700}
.cat-chevron{color:var(--gray);font-size:14px;transition:transform .2s}
.cat-chevron.open{transform:rotate(90deg)}
.cat-items{margin-bottom:12px}

/* ITEM ROW */
.item-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);gap:8px}
.item-row.has-qty{background:rgba(212,168,67,0.06)}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-note{font-size:11px;color:var(--gray);margin-top:1px}
.item-unit{font-size:11px;color:var(--gray-l);font-weight:600;width:28px;text-align:center;flex-shrink:0}
.qty-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qty-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--navy-l);color:var(--white);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;touch-action:manipulation}
.qty-btn:active{background:var(--navy-m)}
.qty-btn.minus{color:var(--coral)}
.qty-btn.plus{color:var(--teal-l)}
.qty-input{width:44px;text-align:center;padding:6px 2px;background:var(--navy);border:1px solid var(--border);border-radius:6px;color:var(--white);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;outline:none}
.qty-input:focus{border-color:var(--gold)}

/* CUSTOM ITEMS */
.custom-section{margin-top:20px;padding:14px;background:var(--navy-l);border:1px solid var(--border);border-radius:12px}
.custom-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px}
.custom-add{display:flex;gap:6px;margin-bottom:10px}
.custom-add input{flex:1;padding:10px;background:var(--navy);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
.custom-add input:focus{border-color:var(--gold)}
.custom-add button{padding:10px 16px;background:var(--gold);color:var(--bg);font-weight:700;font-size:13px;border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.custom-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--navy);border-radius:8px;margin-bottom:4px}
.custom-item-info{font-size:13px;color:var(--white)}
.custom-item-info span{color:var(--gray-l);margin-left:6px;font-size:11px}
.custom-rm{background:none;border:none;color:var(--coral);cursor:pointer;font-size:18px;padding:4px}

/* SUMMARY */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--navy-l);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-val{font-size:22px;font-weight:700;color:var(--gold)}
.stat-label{font-size:11px;color:var(--gray-l);margin-top:2px}
.action-row{display:flex;gap:8px;margin-bottom:16px}
.action-btn{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;border:none;font-family:'DM Sans',sans-serif}
.action-btn.print{background:var(--teal);color:var(--white)}
.action-btn.clear{background:var(--navy-l);border:1px solid var(--coral);color:var(--coral)}
.summary-cat{margin-bottom:16px}
.summary-cat-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.summary-table{width:100%;border-collapse:collapse}
.summary-table th{text-align:left;font-size:11px;color:var(--gray-l);font-weight:600;padding:4px 8px;border-bottom:1px solid var(--border)}
.summary-table td{font-size:13px;padding:6px 8px;border-bottom:1px solid rgba(30,48,80,0.5)}
.summary-table td.qty{color:var(--gold);font-weight:700;text-align:center;width:50px}
.summary-table td.unit{color:var(--gray-l);text-align:center;width:40px}
.summary-table td.note{color:var(--gray);font-size:11px}
.summary-custom{margin-top:16px;padding:14px;background:var(--navy-l);border:1px solid var(--border);border-radius:12px}

/* SALES DASHBOARD */
.upload-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.upload-bar label{font-size:13px;color:var(--gray-l);font-weight:600}
.upload-bar input[type=file]{font-size:12px;color:var(--gray-l)}
.upload-msg{font-size:12px;padding:6px 10px;border-radius:6px;margin-bottom:10px}
.upload-msg.ok{background:rgba(26,138,125,0.15);color:var(--teal-l)}
.upload-msg.err{background:rgba(232,93,74,0.15);color:var(--coral)}
.chart-wrap{background:var(--navy-l);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
.chart-title{font-size:13px;font-weight:700;color:var(--white);margin-bottom:10px}
.pie-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;justify-content:center}
.pie-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-l)}
.pie-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* RANKINGS */
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{text-align:left;font-size:11px;color:var(--gray-l);font-weight:600;padding:6px 6px;border-bottom:1px solid var(--border);white-space:nowrap}
.rank-table td{font-size:12px;padding:6px 6px;border-bottom:1px solid rgba(30,48,80,0.4);vertical-align:middle}
.rank-num{color:var(--gold);font-weight:700;width:24px}
.rank-name{max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-cat{color:var(--gray-l);font-size:11px}
.mini-bars{display:flex;align-items:flex-end;gap:1px;height:18px}
.mini-bar{width:6px;background:var(--gold);border-radius:1px;min-height:2px;opacity:0.7}

/* TIMESTAMP */
.timestamp{text-align:center;padding:8px;font-size:11px;color:var(--gray);flex-shrink:0;border-top:1px solid var(--border);background:var(--navy)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:var(--gray)}
.empty-state .em{font-size:36px;margin-bottom:10px}
.empty-state p{font-size:14px}

@media(max-width:400px){
  .specials-grid{grid-template-columns:1fr 1fr}
  .stats-row{grid-template-columns:1fr 1fr 1fr}
  .stat-val{font-size:18px}
}
</style>
</head>

/* ══════════════════════════════════════════════════════
   UTILITY FUNCTIONS
   ══════════════════════════════════════════════════════ */

function getWeekMonday() {
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? 1 : (day === 1 ? 0 : 8 - day);
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function fmtMoney(n) {
  return '$' + (n||0).toLocaleString();
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
}

/* ── Clover CSV Parser ─────────────────────────────── */
function parseCloverCSV(text) {
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  const dateRange = (lines[1]||"").replace(/"/g,"").trim();
  let gross = 0, net = 0, currentCat = null;
  const items = [];

  for (const line of lines) {
    if (line.startsWith("Gross Sales,")) gross = parseFloat(line.split(",")[1].replace(/["\$,]/g,"")) || 0;
    if (line.startsWith("Net Sales,")) net = parseFloat(line.split(",")[1].replace(/["\$,]/g,"")) || 0;
  }

  for (const line of lines) {
    if (!line.trim()) continue;
    const row = [];
    let inQuote = false, field = "";
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuote = !inQuote; continue; }
      if (ch === ',' && !inQuote) { row.push(field.trim()); field = ""; continue; }
      field += ch;
    }
    row.push(field.trim());

    if (row[0] && row.length <= 2 && !row[0].startsWith("Items") && !row[0].startsWith("Categories") && !row[0].startsWith("The report") && !row[0].startsWith("Requested") && !row[0].startsWith("Filters") && !row[0].startsWith("Gross") && !row[0].startsWith("Net") && !row[0].startsWith("COGS") && !row[0].startsWith("TOTAL") && !row[0].startsWith("Category")) {
      currentCat = row[0]; continue;
    }

    if (row.length >= 5 && !row[0] && row[1] && row[1] !== " " && row[2] && row[2].startsWith("$")) {
      const name = row[1];
      if (name === "Name" || name.startsWith("Total") || name.includes("Rounded Change")) continue;
      const soldStr = row[4];
      if (!soldStr || soldStr === " ") continue;
      try {
        const sold = parseInt(soldStr);
        const itemGross = parseFloat(row[2].replace(/[\$,]/g,"")) || 0;
        const itemNet = parseFloat(row[3].replace(/[\$,]/g,"")) || 0;
        if (!isNaN(sold)) items.push({ name, cat: currentCat || "Other", sold, gross: itemGross, net: itemNet });
      } catch(e) {}
    }
  }

  let label = dateRange;
  try {
    const start = dateRange.split(" - ")[0].trim();
    const d = new Date(start);
    if (!isNaN(d)) label = d.toLocaleDateString("en-US", { month:"short", day:"2-digit" });
  } catch(e) {}

  return { label, dateRange, gross, net, items, totalSold: items.reduce((s,i) => s + i.sold, 0) };
}

/* ══════════════════════════════════════════════════════
   SUPABASE DATA LAYER
   ══════════════════════════════════════════════════════ */

async function loadOrder() {
  const weekOf = getWeekMonday();
  try {
    const { data } = await sb.from('kitchen_orders')
      .select('*').eq('week_of', weekOf).single();
    return data;
  } catch(e) { return null; }
}

async function saveOrder(quantities, customItems, specialWeek) {
  const weekOf = getWeekMonday();
  try {
    await sb.from('kitchen_orders')
      .upsert({
        week_of: weekOf,
        special_week: specialWeek,
        quantities: quantities,
        custom_items: customItems,
        updated_at: new Date().toISOString()
      }, { onConflict: 'week_of' });
    return true;
  } catch(e) { return false; }
}

async function loadSales() {
  try {
    const { data } = await sb.from('kitchen_sales')
      .select('*').order('week_label', { ascending: true });
    return data || [];
  } catch(e) { return []; }
}

async function upsertSalesWeek(parsed) {
  try {
    await sb.from('kitchen_sales')
      .upsert({
        week_label: parsed.label,
        date_range: parsed.dateRange,
        gross: Math.round(parsed.gross),
        net: Math.round(parsed.net),
        items: parsed.items.map(i => ({ n: i.name, s: i.sold, g: i.gross })),
        uploaded_at: new Date().toISOString()
      }, { onConflict: 'week_label' });
    return true;
  } catch(e) { return false; }
}

function Login({ onAuth }) {
  const [pin, setPin] = useState('');
  const [err, setErr] = useState('');
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  const submit = (e) => {
    e && e.preventDefault();
    if (pin === CORRECT_PIN) {
      sessionStorage.setItem(AUTH_KEY, 'true');
      onAuth();
    } else {
      setErr('Incorrect PIN');
      setPin('');
      inputRef.current?.focus();
    }
  };

  const handleKey = (e) => {
    if (e.key === 'Enter') submit();
  };

  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-emoji">&#x1F422;</div>
        <div className="login-title">TIKI TURTLE CAFE</div>
        <div className="login-sub">Kitchen Operations</div>
        <input
          ref={inputRef}
          className="login-input"
          type="password"
          inputMode="numeric"
          maxLength={4}
          placeholder="PIN"
          value={pin}
          onChange={e => { setErr(''); setPin(e.target.value.replace(/\D/g,'')); }}
          onKeyDown={handleKey}
        />
        <button className="login-btn" onClick={submit}>Unlock</button>
        {err && <div className="login-err">{err}</div>}
      </div>
    </div>
  );
}

      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#8a97a8', font: { size: 11 } } }, tooltip: { backgroundColor: '#0f1a2e', borderColor: '#1e3050', borderWidth: 1, titleColor: '#eee8dc', bodyColor: '#eee8dc', callbacks: { label: c => c.dataset.label + ': $' + c.raw.toLocaleString() } } },
        scales: { x: { ticks: { color: '#6b7a8d', font: { size: 10 } }, grid: { color: '#1e3050' } }, y: { ticks: { color: '#6b7a8d', font: { size: 10 }, callback: v => '$' + (v/1000).toFixed(1) + 'k' }, grid: { color: '#1e3050' } } }
      }
    });
    return () => { if (revenueChart.current) revenueChart.current.destroy(); };
  }, [weeks]);

  /* Chart.js — Category Doughnut */
  useEffect(() => {
    if (!pieRef.current) return;
    if (pieChart.current) pieChart.current.destroy();
    const ctx = pieRef.current.getContext('2d');
    pieChart.current = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: catTotals.map(c => c.name),
        datasets: [{ data: catTotals.map(c => c.value), backgroundColor: catTotals.map((_,i) => CC[i%CC.length]), borderColor: '#0f1a2e', borderWidth: 2 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '55%',
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#0f1a2e', borderColor: '#1e3050', borderWidth: 1, titleColor: '#eee8dc', bodyColor: '#eee8dc', callbacks: { label: c => c.label + ': $' + c.raw.toLocaleString() } } }
      }
    });
    return () => { if (pieChart.current) pieChart.current.destroy(); };
  }, [catTotals]);

  /* Handle file upload */
  const handleFiles = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setUploadMsg({ type: 'ok', text: `Processing ${files.length} file(s)...` });
    let count = 0;
    for (const file of files) {
      try {
        const text = await file.text();
        const parsed = parseCloverCSV(text);
        if (parsed.gross > 0) {
          const ok = await upsertSalesWeek(parsed);
          if (ok) count++;
        }
      } catch(err) {
        console.error('CSV parse error', err);
      }
    }
    if (count > 0) {
      setUploadMsg({ type: 'ok', text: `Uploaded ${count} week(s) successfully.` });
      onUpload();
    } else {
      setUploadMsg({ type: 'err', text: 'No valid sales data found in uploaded files.' });
    }
    e.target.value = '';
  };

  return (
    <div className="pad">
      {/* Upload bar */}
      <div className="upload-bar">
        <label>Upload Clover Sales Reports:</label>
        <input type="file" accept=".csv" multiple onChange={handleFiles} />
      </div>
      {uploadMsg && <div className={`upload-msg ${uploadMsg.type}`}>{uploadMsg.text}</div>}

      {/* Stats row */}
      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-val">{fmtMoney(totalGross)}</div>
          <div className="stat-label">Total Gross</div>
        </div>
        <div className="stat-card">
          <div className="stat-val" style={{fontSize:16}}>{bestWeek?.label || '-'}</div>
          <div className="stat-label">Best Week ({fmtMoney(bestWeek?.gross)})</div>
        </div>
        <div className="stat-card">
          <div className="stat-val" style={{color:trendUp?'var(--teal-l)':'var(--coral)',fontSize:18}}>
            {trendUp?'+':''}{trend3}%
          </div>
          <div className="stat-label">3-Week Trend</div>
        </div>
      </div>

      {/* Weekly Revenue Chart */}
      <div className="chart-wrap">
        <div className="chart-title">Weekly Revenue</div>
        <div style={{height:220}}>
          <canvas ref={revenueRef} />
        </div>
      </div>

      {/* Category Pie */}
      <div className="chart-wrap">
        <div className="chart-title">Sales by Category</div>
        <div style={{height:220}}>
          <canvas ref={pieRef} />
        </div>
        <div className="pie-legend">
          {catTotals.map((c,i) => (
            <div className="pie-legend-item" key={c.name}>
              <div className="pie-dot" style={{background:CC[i%CC.length]}} />
              {c.name}
            </div>
          ))}
        </div>
      </div>

      {/* Item Rankings */}
      <div className="chart-wrap">
        <div className="chart-title">Item Rankings</div>
        <div style={{overflowX:'auto'}}>
          <table className="rank-table">
            <thead>
              <tr><th>#</th><th>Item</th><th>Cat</th><th>Sold</th><th>Net</th><th>Avg/wk</th><th>Trend</th></tr>
            </thead>
            <tbody>
              {items.sort((a,b) => (b.net||0) - (a.net||0)).map((it, idx) => {
                const wks = it.w || [];
                const last6 = wks.slice(-6);
                const maxVal = Math.max(...last6, 1);
                const avgWk = wks.length ? (it.sold / wks.length).toFixed(0) : '-';
                return (
                  <tr key={it.name}>
                    <td className="rank-num">{idx+1}</td>
                    <td className="rank-name">{it.name}</td>
                    <td className="rank-cat">{it.cat}</td>
                    <td>{it.sold}</td>
                    <td>{fmtMoney(it.net)}</td>
                    <td>{avgWk}</td>
                    <td>
                      <div className="mini-bars">
                        {last6.map((v,j) => (
                          <div key={j} className="mini-bar" style={{height: Math.max(2, (v/maxVal)*18) + 'px'}} />
                        ))}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}


/* ══════════════════════════════════════════════════════
   MAIN APP COMPONENT
   ══════════════════════════════════════════════════════ */

function App({ onLogout }) {
  const [tab, setTab] = useState('order');
  const [quantities, setQuantities] = useState({});
  const [customItems, setCustomItems] = useState([]);
  const [specialWeek, setSpecialWeek] = useState('week1');
  const [syncStatus, setSyncStatus] = useState('load'); // 'ok' | 'err' | 'load'
  const [lastUpdated, setLastUpdated] = useState(null);
  const [salesData, setSalesData] = useState({ weeks: INITIAL_SALES.weeks, items: INITIAL_SALES.items });

  const saveTimer = useRef(null);
  const localUpdatedAt = useRef(null);
  const isInitialLoad = useRef(true);

  /* ── Load order on mount ────────────────────────── */
  useEffect(() => {
    (async () => {
      setSyncStatus('load');
      const order = await loadOrder();
      if (order) {
        setQuantities(order.quantities || {});
        setCustomItems(order.custom_items || []);
        setSpecialWeek(order.special_week || 'week1');
        localUpdatedAt.current = order.updated_at;
        setLastUpdated(order.updated_at);
      }
      isInitialLoad.current = false;
      setSyncStatus('ok');
    })();
  }, []);

  /* ── Load sales on mount ────────────────────────── */
  useEffect(() => {
    (async () => {
      const rows = await loadSales();
      if (rows.length > 0) {
        const weeks = rows.map(r => ({ label: r.week_label, gross: r.gross, net: r.net }));
        // Merge item data from INITIAL_SALES since DB might not have item-level detail
        setSalesData({ weeks, items: INITIAL_SALES.items });
      }
    })();
  }, []);

  /* ── Poll for remote changes ────────────────────── */
  useEffect(() => {
    const interval = setInterval(async () => {
      try {
        const order = await loadOrder();
        if (order && order.updated_at && localUpdatedAt.current) {
          if (new Date(order.updated_at) > new Date(localUpdatedAt.current)) {
            setQuantities(order.quantities || {});
            setCustomItems(order.custom_items || []);
            setSpecialWeek(order.special_week || 'week1');
            localUpdatedAt.current = order.updated_at;
            setLastUpdated(order.updated_at);
          }
        }
        setSyncStatus('ok');
      } catch(e) {
        setSyncStatus('err');
      }
    }, 30000);
    return () => clearInterval(interval);
  }, []);

  /* ── Debounced save ─────────────────────────────── */
  const doSave = useCallback(async (q, ci, sw) => {
    setSyncStatus('load');
    const ok = await saveOrder(q, ci, sw);
    const now = new Date().toISOString();
    localUpdatedAt.current = now;
    setLastUpdated(now);
    setSyncStatus(ok ? 'ok' : 'err');
  }, []);

  const scheduleSave = useCallback((q, ci, sw) => {
    if (isInitialLoad.current) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => doSave(q, ci, sw), 500);
  }, [doSave]);

  /* ── Setters ────────────────────────────────────── */
  const setQty = useCallback((name, val) => {
    setQuantities(prev => {
      const next = { ...prev };
      if (val === 0) { delete next[name]; } else { next[name] = val; }
      scheduleSave(next, customItems, specialWeek);
      return next;
    });
  }, [customItems, specialWeek, scheduleSave]);

  const handleSetSpecialWeek = useCallback((sw) => {
    setSpecialWeek(sw);
    scheduleSave(quantities, customItems, sw);
  }, [quantities, customItems, scheduleSave]);

  const addCustom = useCallback((item) => {
    setCustomItems(prev => {
      const next = [...prev, item];
      scheduleSave(quantities, next, specialWeek);
      return next;
    });
  }, [quantities, specialWeek, scheduleSave]);

  const removeCustom = useCallback((idx) => {
    setCustomItems(prev => {
      const next = prev.filter((_,i) => i !== idx);
      scheduleSave(quantities, next, specialWeek);
      return next;
    });
  }, [quantities, specialWeek, scheduleSave]);

  const clearAll = useCallback(() => {
    if (!confirm('Clear all quantities and custom items?')) return;
    setQuantities({});
    setCustomItems([]);
    scheduleSave({}, [], specialWeek);
  }, [specialWeek, scheduleSave]);

  /* ── Reload sales ───────────────────────────────── */
  const reloadSales = useCallback(async () => {
    const rows = await loadSales();
    if (rows.length > 0) {
      const weeks = rows.map(r => ({ label: r.week_label, gross: r.gross, net: r.net }));
      setSalesData(prev => ({ ...prev, weeks }));
    }
  }, []);

  /* ── Count ordered items for badge ──────────────── */
  const orderedCount = Object.values(quantities).filter(v => v > 0).length + customItems.length;

  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <div className="header-left">
          <span className="header-emoji">&#x1F422;</span>
          <div>
            <div className="header-title">TIKI TURTLE CAFE</div>
            <div className="header-sub">
              Kitchen Ops
              <span className={`sync-dot ${syncStatus === 'ok' ? 'sync-ok' : syncStatus === 'err' ? 'sync-err' : 'sync-load'}`} />
              {syncStatus === 'ok' ? 'Synced' : syncStatus === 'err' ? 'Offline' : 'Saving...'}
            </div>
          </div>
        </div>
        <button className="logout-btn" onClick={onLogout}>Logout</button>
      </div>

      {/* Tab bar */}
      <div className="tab-bar">
        <div className={`tab ${tab==='order'?'active':''}`} onClick={() => setTab('order')}>Weekly Order</div>
        <div className={`tab ${tab==='summary'?'active':''}`} onClick={() => setTab('summary')}>
          Summary
          {orderedCount > 0 && <span className="badge">{orderedCount}</span>}
        </div>
        <div className={`tab ${tab==='sales'?'active':''}`} onClick={() => setTab('sales')}>Sales</div>
      </div>

      {/* Content */}
      <div className="content">
        {tab === 'order' && (
          <OrderTab
            quantities={quantities}
            setQty={setQty}
            specialWeek={specialWeek}
            setSpecialWeek={handleSetSpecialWeek}
            customItems={customItems}
            addCustom={addCustom}
            removeCustom={removeCustom}
          />
        )}
        {tab === 'summary' && (
          <SummaryTab
            quantities={quantities}
            customItems={customItems}
            specialWeek={specialWeek}
            clearAll={clearAll}
          />
        )}
        {tab === 'sales' && (
          <DashTab
            salesData={salesData}
            onUpload={reloadSales}
          />
        )}
      </div>

      {/* Timestamp footer */}
      <div className="timestamp">
        {lastUpdated ? `Last updated: ${fmtTime(lastUpdated)}` : 'No data saved yet'} &middot; Week of {fmtDate(getWeekMonday())}
      </div>
    </div>
  );
}


/* ══════════════════════════════════════════════════════
   ROOT
   ══════════════════════════════════════════════════════ */

function Root() {
  const [authed, setAuthed] = useState(sessionStorage.getItem(AUTH_KEY) === 'true');

  const handleLogout = () => {
    sessionStorage.removeItem(AUTH_KEY);
    setAuthed(false);
  };

  if (!authed) return <Login onAuth={() => setAuthed(true)} />;
  return <App onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
